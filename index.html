<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Buy Zone Alerts — Know when a stock or crypto may be worth buying. Simple verdicts for everyday investors." />
    <title>Buy Zone Alerts — Buy Timing for Everyday Investors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #080c0f; color: #f0f4f8; font-family: 'Inter', 'Helvetica Neue', sans-serif; overflow-x: hidden; }
      input::placeholder { color: #475569; }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const TICKERS = ["AAPL", "NVDA", "TSLA", "BTC", "ETH", "SOL", "XRP"];
      const SAMPLE_ZONES = [
        { ticker: "AAPL", type: "STOCK", zone: "BUY" },
        { ticker: "SOFI", type: "STOCK", zone: "BUY" },
        { ticker: "HBAR", type: "CRYPTO", zone: "BUY" },
        { ticker: "ETH", type: "CRYPTO", zone: "BUY" },
        { ticker: "NVDA", type: "STOCK", zone: "WAIT" },
        { ticker: "TSLA", type: "STOCK", zone: "CAUTION" },
      ];
      const ZONE_STYLES = {
        BUY: { bg: "#0d2918", border: "#1a5c30", dot: "#22c55e", text: "#22c55e", label: "BUY ZONE" },
        WAIT: { bg: "#2a1f00", border: "#7c5200", dot: "#f59e0b", text: "#f59e0b", label: "WAIT ZONE" },
        CAUTION: { bg: "#2a0d0d", border: "#7c1d1d", dot: "#ef4444", text: "#ef4444", label: "CAUTION ZONE" },
      };

      function ZoneBadge({ zone, size = "sm" }) {
        const s = ZONE_STYLES[zone];
        return (
          <span style={{ background: s.bg, border: `1px solid ${s.border}`, borderRadius: 999, color: s.text, fontWeight: 700, fontSize: size === "lg" ? 13 : 11, letterSpacing: "0.08em", padding: size === "lg" ? "10px 20px" : "5px 12px", display: "inline-flex", alignItems: "center", gap: 6, whiteSpace: "nowrap" }}>
            <span style={{ width: size === "lg" ? 9 : 7, height: size === "lg" ? 9 : 7, borderRadius: "50%", background: s.dot, display: "inline-block", boxShadow: `0 0 6px ${s.dot}` }} />
            {s.label}
          </span>
        );
      }

      function AnimatedTicker({ value }) {
        const [display, setDisplay] = useState(0);
        useEffect(() => {
          let start = 0;
          const step = value / 40;
          const timer = setInterval(() => {
            start += step;
            if (start >= value) { setDisplay(value); clearInterval(timer); }
            else setDisplay(Math.floor(start));
          }, 30);
          return () => clearInterval(timer);
        }, [value]);
        return <span>{display}</span>;
      }

      function App() {
        const [ticker, setTicker] = useState("");
        const [email, setEmail] = useState("");
        const [emailSubmitted, setEmailSubmitted] = useState(false);

        return (
          <div style={{ background: "#080c0f", minHeight: "100vh" }}>

            {/* NAV */}
            <nav style={{ position: "sticky", top: 0, zIndex: 100, background: "rgba(8,12,15,0.95)", backdropFilter: "blur(12px)", borderBottom: "1px solid #1a2530", padding: "0 24px", display: "flex", alignItems: "center", justifyContent: "space-between", height: 60 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 32, height: 32, borderRadius: 8, background: "linear-gradient(135deg, #f59e0b, #d97706)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16 }}>🔔</div>
                <div>
                  <div style={{ fontWeight: 800, fontSize: 15, color: "#f0f4f8" }}>Buy Zone Alerts</div>
                  <div style={{ fontSize: 9, color: "#64748b", letterSpacing: "0.12em", textTransform: "uppercase" }}>Buy Timing for Everyday Investors</div>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button style={{ background: "transparent", border: "1px solid #1e3040", color: "#94a3b8", borderRadius: 8, padding: "7px 14px", fontSize: 13, cursor: "pointer", fontWeight: 500 }}>Sign In</button>
                <button style={{ background: "linear-gradient(135deg, #f59e0b, #d97706)", border: "none", color: "#000", borderRadius: 8, padding: "7px 16px", fontSize: 13, cursor: "pointer", fontWeight: 700 }}>Get Started</button>
              </div>
            </nav>

            {/* HERO */}
            <section style={{ maxWidth: 760, margin: "0 auto", padding: "80px 24px 60px", textAlign: "center" }}>
              <div style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "#0d2918", border: "1px solid #1a5c30", borderRadius: 999, padding: "6px 14px", marginBottom: 28, fontSize: 12, color: "#22c55e", fontWeight: 600, letterSpacing: "0.06em" }}>
                <span style={{ width: 6, height: 6, borderRadius: "50%", background: "#22c55e", display: "inline-block", boxShadow: "0 0 8px #22c55e" }} />
                DAILY BUY ZONE SCAN UPDATED
              </div>
              <h1 style={{ fontSize: "clamp(36px, 7vw, 64px)", fontWeight: 900, lineHeight: 1.05, letterSpacing: "-0.03em", margin: "0 0 20px", color: "#f8fafc" }}>
                Investing Apps Were Built<br />
                <span style={{ color: "#f59e0b" }}>For Wall Street. Not You.</span>
              </h1>
              <p style={{ fontSize: "clamp(15px, 2.5vw, 18px)", color: "#94a3b8", lineHeight: 1.65, maxWidth: 520, margin: "0 auto 16px" }}>
                Buy Zone Alerts was built for everyday people. Type any stock or crypto — we score it and give you one plain-English verdict. No charts. No jargon. No guesswork.
              </p>
              <p style={{ fontSize: 14, color: "#475569", marginBottom: 32 }}>Be first to know when we go live.</p>

              {emailSubmitted ? (
                <div style={{ maxWidth: 460, margin: "0 auto 32px", background: "#0d2918", border: "1px solid #1a5c30", borderRadius: 14, padding: "18px 24px", color: "#22c55e", fontWeight: 700, fontSize: 16 }}>
                  ✅ You're on the list! We'll hit you when we launch.
                </div>
              ) : (
                <div style={{ maxWidth: 460, margin: "0 auto 32px" }}>
                  <div style={{ display: "flex", gap: 8, background: "#0e1a24", border: "1px solid #1e3040", borderRadius: 14, padding: "6px 6px 6px 16px", alignItems: "center", marginBottom: 10 }}>
                    <input value={email} onChange={e => setEmail(e.target.value)} placeholder="your@email.com" type="email" style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#f0f4f8", fontSize: 15, fontFamily: "inherit" }} />
                    <button onClick={() => email.includes("@") && setEmailSubmitted(true)} style={{ background: "linear-gradient(135deg, #f59e0b, #d97706)", border: "none", color: "#000", borderRadius: 10, padding: "12px 22px", fontSize: 14, fontWeight: 800, cursor: "pointer", whiteSpace: "nowrap" }}>
                      Notify Me at Launch
                    </button>
                  </div>
                  <div style={{ fontSize: 12, color: "#334155" }}>No spam. Just one email when we launch. That's it.</div>
                </div>
              )}

              <div style={{ fontSize: 11, color: "#475569", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 12 }}>Or preview the app now</div>
              <div style={{ display: "flex", gap: 8, maxWidth: 520, margin: "0 auto 14px", background: "#0e1a24", border: "1px solid #1e3040", borderRadius: 14, padding: "6px 6px 6px 16px", alignItems: "center" }}>
                <span style={{ fontSize: 18, color: "#475569" }}>🔍</span>
                <input value={ticker} onChange={e => setTicker(e.target.value.toUpperCase())} placeholder="Enter a stock or crypto — AAPL, BTC, TSLA..." style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#f0f4f8", fontSize: 15, fontFamily: "inherit" }} />
                <button style={{ background: "linear-gradient(135deg, #22c55e, #16a34a)", border: "none", color: "#fff", borderRadius: 10, padding: "11px 22px", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>Check Zone</button>
              </div>
              <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
                {TICKERS.map(t => (
                  <button key={t} onClick={() => setTicker(t)} style={{ background: ticker === t ? "#1e3a50" : "#0e1a24", border: `1px solid ${ticker === t ? "#3b82f6" : "#1e3040"}`, color: ticker === t ? "#60a5fa" : "#64748b", borderRadius: 999, padding: "5px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{t}</button>
                ))}
              </div>
            </section>

            {/* SAMPLE RESULT */}
            <section style={{ maxWidth: 600, margin: "0 auto 80px", padding: "0 24px" }}>
              <div style={{ background: "#0a1520", border: "1px solid #1e3040", borderRadius: 20, overflow: "hidden" }}>
                <div style={{ background: "#0d1e2e", padding: "12px 20px", borderBottom: "1px solid #1e3040", display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ width: 7, height: 7, borderRadius: "50%", background: "#22c55e", boxShadow: "0 0 8px #22c55e", display: "inline-block" }} />
                  <span style={{ fontSize: 11, color: "#64748b", fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase" }}>Live Sample Result</span>
                </div>
                <div style={{ padding: "24px" }}>
                  <div style={{ fontSize: 13, color: "#64748b", marginBottom: 4 }}>Apple Inc. · AAPL · STOCK</div>
                  <div style={{ fontSize: 28, fontWeight: 800, color: "#f8fafc", marginBottom: 16 }}>$213.49 <span style={{ fontSize: 14, color: "#22c55e" }}>▲ +1.2%</span></div>
                  <div style={{ marginBottom: 20 }}><ZoneBadge zone="BUY" size="lg" /></div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                    {[{ label: "Quality Score", val: 8.7 }, { label: "Entry Score", val: 9.1 }].map(({ label, val }) => (
                      <div key={label} style={{ background: "#0d1e2e", borderRadius: 12, padding: "14px 16px", border: "1px solid #1e3040" }}>
                        <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>{label}</div>
                        <div style={{ fontSize: 22, fontWeight: 800, color: "#22c55e" }}>{val}<span style={{ fontSize: 13, color: "#475569" }}>/10</span></div>
                        <div style={{ marginTop: 8, height: 4, borderRadius: 4, background: "#1e3040" }}>
                          <div style={{ height: "100%", width: `${val * 10}%`, background: "linear-gradient(90deg, #22c55e, #22c55e88)", borderRadius: 4 }} />
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ background: "#0d1e2e", borderRadius: 12, padding: "14px 16px", border: "1px solid #1e3040" }}>
                    <div style={{ fontSize: 11, color: "#64748b", fontWeight: 600, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Simple Explanation</div>
                    <div style={{ fontSize: 14, color: "#cbd5e1", lineHeight: 1.6 }}>AAPL is trading near a historically attractive price range with strong fundamentals. This may represent a solid long-term buying opportunity.</div>
                  </div>
                </div>
              </div>
            </section>

            {/* THREE VERDICTS */}
            <section style={{ maxWidth: 900, margin: "0 auto 80px", padding: "0 24px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 14 }}>The System</div>
              <h2 style={{ fontSize: "clamp(26px, 4vw, 40px)", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 12 }}>Three Simple Verdicts</h2>
              <p style={{ fontSize: 15, color: "#64748b", marginBottom: 44 }}>Every stock or crypto gets one clear signal. No in-between, no confusion.</p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
                {[
                  { zone: "BUY", title: "Buy Zone", desc: "Price is in an attractive range with solid fundamentals. May be worth considering as an entry." },
                  { zone: "WAIT", title: "Wait Zone", desc: "Not quite there yet. Monitor this one and wait for a better entry point." },
                  { zone: "CAUTION", title: "Caution Zone", desc: "Price may be extended or risk outweighs reward right now. Proceed carefully." },
                ].map(({ zone, title, desc }) => {
                  const s = ZONE_STYLES[zone];
                  return (
                    <div key={zone} style={{ background: s.bg, border: `1px solid ${s.border}`, borderRadius: 16, padding: "28px 24px", textAlign: "left" }}>
                      <ZoneBadge zone={zone} />
                      <div style={{ fontSize: 17, fontWeight: 700, color: "#f8fafc", margin: "16px 0 10px" }}>{title}</div>
                      <div style={{ fontSize: 14, color: "#94a3b8", lineHeight: 1.6 }}>{desc}</div>
                    </div>
                  );
                })}
              </div>
            </section>

            {/* TODAY'S SCAN */}
            <section style={{ maxWidth: 700, margin: "0 auto 80px", padding: "0 24px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 14 }}>Daily Scan</div>
              <h2 style={{ fontSize: "clamp(24px, 4vw, 36px)", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 10 }}>Today's Buy Zones</h2>
              <p style={{ fontSize: 14, color: "#64748b", marginBottom: 32 }}>A sample of real assets in our system — updated every evening.</p>
              <div style={{ background: "#0a1520", border: "1px solid #1e3040", borderRadius: 20, overflow: "hidden" }}>
                {SAMPLE_ZONES.map((item, i) => (
                  <div key={item.ticker} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", borderBottom: i < SAMPLE_ZONES.length - 1 ? "1px solid #0e1a24" : "none" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                      <div style={{ width: 38, height: 38, borderRadius: 10, background: "#0e1a24", border: "1px solid #1e3040", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: "#64748b" }}>{item.ticker.slice(0, 3)}</div>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 15, color: "#f0f4f8" }}>{item.ticker}</div>
                        <div style={{ fontSize: 12, color: "#475569" }}>{item.type}</div>
                      </div>
                    </div>
                    <ZoneBadge zone={item.zone} />
                  </div>
                ))}
                <div style={{ padding: "20px 24px", borderTop: "1px solid #1e3040", background: "#0d1e2e" }}>
                  <button style={{ background: "linear-gradient(135deg, #f59e0b, #d97706)", border: "none", color: "#000", borderRadius: 10, padding: "12px 28px", fontSize: 14, fontWeight: 800, cursor: "pointer", width: "100%", maxWidth: 320 }}>🔓 Unlock Full Daily Scanner</button>
                </div>
              </div>
            </section>

            {/* HOW IT WORKS */}
            <section style={{ maxWidth: 900, margin: "0 auto 80px", padding: "0 24px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 14 }}>No Learning Curve</div>
              <h2 style={{ fontSize: "clamp(26px, 4vw, 40px)", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 44 }}>How It Works</h2>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(220px, 1fr))", gap: 16 }}>
                {[
                  { num: "1", title: "Type a Ticker", desc: "Enter any stock or crypto — AAPL, BTC, TSLA, SOL, whatever you're watching." },
                  { num: "2", title: "We Do the Heavy Lifting", desc: "Our system scores price timing, company quality, momentum, and market conditions." },
                  { num: "3", title: "Get Your Verdict", desc: "Receive a plain-English Buy Zone, Wait Zone, or Caution Zone instantly." },
                ].map(({ num, title, desc }) => (
                  <div key={num} style={{ background: "#0a1520", border: "1px solid #1e3040", borderRadius: 16, padding: "28px 22px", textAlign: "left" }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: "#f59e0b22", border: "1px solid #f59e0b44", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 800, color: "#f59e0b", marginBottom: 16 }}>{num}</div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: "#f8fafc", marginBottom: 10 }}>{title}</div>
                    <div style={{ fontSize: 13, color: "#64748b", lineHeight: 1.65 }}>{desc}</div>
                  </div>
                ))}
              </div>
            </section>

            {/* VS COMPARISON */}
            <section style={{ maxWidth: 800, margin: "0 auto 80px", padding: "0 24px" }}>
              <div style={{ textAlign: "center", marginBottom: 36 }}>
                <h2 style={{ fontSize: "clamp(24px, 4vw, 36px)", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 10 }}>Confidence Without Complexity</h2>
                <p style={{ fontSize: 14, color: "#64748b" }}>Built for the everyday investor, not Wall Street.</p>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
                <div style={{ background: "#150a0a", border: "1px solid #3b1212", borderRadius: 16, padding: "24px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#ef4444", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>Traditional Research</div>
                  {["Complex charts & indicators", "Hours of research", "Confusing financial jargon", "Information overload", "Fear of buying at wrong time"].map(item => (
                    <div key={item} style={{ display: "flex", gap: 10, marginBottom: 13, fontSize: 13, color: "#94a3b8" }}>
                      <span style={{ color: "#ef4444", fontWeight: 700, flexShrink: 0 }}>✕</span> {item}
                    </div>
                  ))}
                </div>
                <div style={{ background: "#0d2918", border: "1px solid #1a5c30", borderRadius: 16, padding: "24px" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#22c55e", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 20 }}>Buy Zone Alerts</div>
                  {["Simple verdicts, plain English", "Fast analysis in seconds", "No experience required", "Beginner-friendly", "Confidence without complexity"].map(item => (
                    <div key={item} style={{ display: "flex", gap: 10, marginBottom: 13, fontSize: 13, color: "#94a3b8" }}>
                      <span style={{ color: "#22c55e", fontWeight: 700, flexShrink: 0 }}>✓</span> {item}
                    </div>
                  ))}
                </div>
              </div>
            </section>

            {/* STATS */}
            <section style={{ maxWidth: 800, margin: "0 auto 80px", padding: "0 24px" }}>
              <div style={{ background: "linear-gradient(135deg, #0d1e2e, #0a1520)", border: "1px solid #1e3040", borderRadius: 20, padding: "44px 32px", display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 32, textAlign: "center" }}>
                {[{ val: 60, label: "Assets Scanned Daily", suffix: "+" }, { val: 28, label: "In Buy Zone Today", suffix: "" }, { val: 9, label: "Per Month After Launch", prefix: "$", suffix: ".99" }].map(({ val, label, suffix, prefix }) => (
                  <div key={label}>
                    <div style={{ fontSize: "clamp(32px, 5vw, 48px)", fontWeight: 900, color: "#f59e0b", letterSpacing: "-0.02em", lineHeight: 1 }}>
                      {prefix || ""}<AnimatedTicker value={val} />{suffix}
                    </div>
                    <div style={{ fontSize: 13, color: "#64748b", marginTop: 8 }}>{label}</div>
                  </div>
                ))}
              </div>
            </section>

            {/* PRICING */}
            <section style={{ maxWidth: 800, margin: "0 auto 80px", padding: "0 24px", textAlign: "center" }}>
              <div style={{ fontSize: 11, color: "#f59e0b", fontWeight: 700, letterSpacing: "0.14em", textTransform: "uppercase", marginBottom: 14 }}>Simple Pricing</div>
              <h2 style={{ fontSize: "clamp(26px, 4vw, 36px)", fontWeight: 800, letterSpacing: "-0.02em", marginBottom: 10 }}>Show Up. See What to Buy. Have a Good Life.</h2>
              <p style={{ fontSize: 14, color: "#475569", marginBottom: 40, maxWidth: 480, margin: "0 auto 40px" }}>We do the heavy lifting. You just show up and get your verdict.</p>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 16, alignItems: "start" }}>

                {/* FREE */}
                <div style={{ background: "#0a1520", border: "1px solid #1e3040", borderRadius: 20, padding: "32px 28px", textAlign: "left" }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#64748b", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 16 }}>Free</div>
                  <div style={{ fontSize: 44, fontWeight: 900, color: "#f8fafc", letterSpacing: "-0.03em", lineHeight: 1, marginBottom: 4 }}>$0</div>
                  <div style={{ fontSize: 13, color: "#475569", marginBottom: 28 }}>No credit card needed</div>
                  <div style={{ fontSize: 11, color: "#475569", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 14 }}>What you get</div>
                  {[
                    { text: "3 ticker searches per day", included: true },
                    { text: "Zone verdict only (Buy / Wait / Caution)", included: true },
                    { text: "Preview of daily scan — top results teased", included: false },
                    { text: "Score breakdown & explanations", included: false },
                  ].map(({ text, included }) => (
                    <div key={text} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: 12, fontSize: 13, color: included ? "#cbd5e1" : "#475569" }}>
                      <span style={{ color: included ? "#22c55e" : "#334155", fontWeight: 700, flexShrink: 0 }}>{included ? "✓" : "✕"}</span>
                      {text}
                    </div>
                  ))}
                  <button style={{ background: "transparent", border: "1px solid #1e3040", color: "#64748b", borderRadius: 12, padding: "13px 24px", fontSize: 14, fontWeight: 700, cursor: "pointer", width: "100%", marginTop: 8 }}>Start Free</button>
                </div>

                {/* PAID */}
                <div style={{ background: "#0a1520", border: "2px solid #f59e0b", borderRadius: 20, padding: "32px 28px", textAlign: "left", position: "relative", overflow: "hidden" }}>
                  <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "linear-gradient(90deg, #f59e0b, #d97706)" }} />
                  <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "#2a1f00", border: "1px solid #7c5200", borderRadius: 999, padding: "4px 12px", marginBottom: 16, fontSize: 11, color: "#f59e0b", fontWeight: 700 }}>🔥 EARLY BIRD — FIRST 100 MEMBERS</div>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 16 }}>Member Access</div>
                  <div style={{ display: "flex", alignItems: "flex-end", gap: 10, marginBottom: 4 }}>
                    <div style={{ fontSize: 44, fontWeight: 900, color: "#f8fafc", letterSpacing: "-0.03em", lineHeight: 1 }}>$4.99</div>
